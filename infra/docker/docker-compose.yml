version: "3.9"

services:
  db:
    image: postgres:16
    container_name: portfolio-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
